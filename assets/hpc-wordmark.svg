<svg width="220" height="44" viewBox="0 0 220 44" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- HPC bold italic wordmark -->
  <text x="2" y="38"
    font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',Arial,sans-serif"
    font-weight="900"
    font-style="italic"
    font-size="40"
